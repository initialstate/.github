# ─────────────────────────────────────────────────────────────────────────────
# FILE: initialstate/.github/.github/workflows/ci.yml
#
# Reusable CI workflow for SvelteKit + CDK repos.
# Callers: `.github/workflows/ci.yml` in any initialstate repo.
# ─────────────────────────────────────────────────────────────────────────────
name: CI (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: string
        default: '20'
      aws-account-id:
        description: 'AWS account ID (for CDK diff OIDC role)'
        type: string
        required: true
      aws-region:
        description: 'AWS region'
        type: string
        default: 'us-east-1'
      app-name:
        description: 'Application name (e.g. bruce-svelte) used to construct role name'
        type: string
        required: true
      diff-environment:
        description: 'CDK environment to diff on PRs'
        type: string
        default: 'dev'
      run-cdk-diff:
        description: 'Run CDK diff on PRs and post as comment'
        type: boolean
        default: true
      strict-checks:
        description: 'If false, type-check and build failures do not fail the workflow. Intended for repos with in-progress code migrations where CI should report but not block.'
        type: boolean
        default: true

jobs:
  # ── Type check ────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.strict-checks }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Svelte type check
        run: npm run check

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.strict-checks }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Lint (optional — activate once eslint is configured) ─────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Replace with `npm run lint` once an eslint config is added to the repo
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npm run lint
          else
            echo "No eslint config found — skipping lint (add eslint to unlock this check)"
          fi

  # ── Test (optional — activate once vitest is configured) ─────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # --if-present is a no-op exit-0 when the script doesn't exist.
        # Add `npm run test` (vitest etc.) to unlock this check.
        run: npm run test --if-present

  # ── CDK Diff (PR only) ────────────────────────────────────────────────────
  cdk-diff:
    name: CDK Diff (${{ inputs.diff-environment }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.strict-checks }}
    if: ${{ github.event_name == 'pull_request' && inputs.run-cdk-diff }}
    permissions:
      id-token: write    # Required for OIDC
      contents: read
      pull-requests: write  # Required to post PR comment
    environment: ${{ inputs.diff-environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws-account-id }}:role/${{ inputs.app-name }}-${{ inputs.diff-environment }}-deployer
          aws-region: ${{ inputs.aws-region }}

      - name: Configure npm auth for GitHub tarball downloads
        # Private lib-infra (and any other private org deps) is installed via
        # `github:` shorthand, which downloads a tarball from codeload.github.com.
        # The PAT is an org-level secret with contents:read on initialstate/lib-infra.
        run: |
          cat > ~/.npmrc <<'EOF'
          //codeload.github.com/:_authToken=${NPM_GITHUB_TOKEN}
          //api.github.com/:_authToken=${NPM_GITHUB_TOKEN}
          EOF
          chmod 600 ~/.npmrc
        env:
          NPM_GITHUB_TOKEN: ${{ secrets.LIB_INFRA_READ_TOKEN }}

      - name: Install app dependencies
        run: npm ci

      - name: Install infra dependencies
        # Using `npm install` (not `npm ci`) intentionally. npm's hosted-git-info
        # library canonicalizes private GitHub git deps (e.g. lib-infra) to SSH
        # in package-lock.json on dev machines with SSH keys, which breaks `npm ci`
        # in CI where no SSH keys exist. npm install resolves fresh each run using
        # the `github:` shorthand in package.json + .npmrc tarball auth. lib-infra
        # is pinned to a version tag, so content is stable across runs.
        working-directory: infra
        run: npm install --no-audit --no-fund

      - name: CDK Diff
        id: diff
        working-directory: infra
        # Capture output even if diff exits non-zero (it does when there are changes)
        run: |
          set +e
          DIFF_OUTPUT=$(ENVIRONMENT=${{ inputs.diff-environment }} npm run app:diff 2>&1)
          EXIT_CODE=$?
          echo "diff_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "has_changes=$( [ $EXIT_CODE -ne 0 ] && echo 'true' || echo 'false' )" >> "$GITHUB_OUTPUT"

      - name: Post CDK diff comment
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff_output }}`;
            const hasChanges = `${{ steps.diff.outputs.has_changes }}` === 'true';
            const icon = hasChanges ? '⚠️' : '✅';
            const body = [
              `## ${icon} CDK Diff — \`${{ inputs.diff-environment }}\``,
              '',
              '```',
              diff.slice(0, 60000), // GitHub comment limit guard
              '```',
              '',
              hasChanges
                ? '_Infrastructure changes detected. Review before merging._'
                : '_No infrastructure changes._',
            ].join('\n');

            // Update existing comment if present, otherwise create
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.startsWith('## ') && c.body.includes('CDK Diff')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
